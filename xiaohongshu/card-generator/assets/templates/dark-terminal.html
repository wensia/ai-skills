<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暗黑终端风格模板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="../js/utils.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;700&display=swap');

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #0a0a0a;
            min-height: 100vh;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        // 配色：终端/黑客风
        const colors = {
            bg: '#0d1117',
            surface: '#161b22',
            border: '#30363d',
            green: '#3fb950',
            cyan: '#58a6ff',
            yellow: '#d29922',
            red: '#f85149',
            text: '#c9d1d9',
            muted: '#8b949e',
        };

        // 卡片1：启动画面
        const BootCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="300" height="400" fill="#0d1117" />
                {/* 扫描线效果 */}
                {[...Array(20)].map((_, i) => (
                    <line key={i} x1="0" y1={i * 20} x2="300" y2={i * 20} stroke="#161b22" strokeWidth="1" />
                ))}
                {/* ASCII艺术标题 */}
                <g transform="translate(20, 80)">
                    <text y="0" fill="#3fb950" fontSize="12" fontFamily="JetBrains Mono, monospace">
                        ██████╗ ███████╗██╗   ██╗
                    </text>
                    <text y="15" fill="#3fb950" fontSize="12" fontFamily="JetBrains Mono, monospace">
                        ██╔══██╗██╔════╝██║   ██║
                    </text>
                    <text y="30" fill="#3fb950" fontSize="12" fontFamily="JetBrains Mono, monospace">
                        ██║  ██║█████╗  ██║   ██║
                    </text>
                    <text y="45" fill="#3fb950" fontSize="12" fontFamily="JetBrains Mono, monospace">
                        ██║  ██║██╔══╝  ╚██╗ ██╔╝
                    </text>
                    <text y="60" fill="#3fb950" fontSize="12" fontFamily="JetBrains Mono, monospace">
                        ██████╔╝███████╗ ╚████╔╝
                    </text>
                    <text y="75" fill="#3fb950" fontSize="12" fontFamily="JetBrains Mono, monospace">
                        ╚═════╝ ╚══════╝  ╚═══╝
                    </text>
                </g>
                {/* 系统信息 */}
                <g transform="translate(20, 200)" fontFamily="JetBrains Mono, monospace" fontSize="11">
                    <text y="0" fill="#8b949e">[SYSTEM] Initializing...</text>
                    <text y="20" fill="#3fb950">[OK] Core modules loaded</text>
                    <text y="40" fill="#3fb950">[OK] Network connected</text>
                    <text y="60" fill="#d29922">[WARN] Debug mode enabled</text>
                    <text y="80" fill="#3fb950">[OK] Ready to execute</text>
                </g>
                {/* 光标闪烁 */}
                <rect x="20" y="310" width="8" height="16" fill="#3fb950">
                    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
                </rect>
                {/* 版本信息 */}
                <text x="20" y="380" fill="#30363d" fontSize="10" fontFamily="JetBrains Mono, monospace">
                    v1.0.0 | Terminal Edition
                </text>
            </svg>
        );

        // 卡片2：命令演示
        const CommandCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="300" height="400" fill="#0d1117" />
                {/* 终端窗口 */}
                <g transform="translate(15, 30)">
                    <rect width="270" height="340" rx="8" fill="#161b22" stroke="#30363d" strokeWidth="1" />
                    {/* 标题栏 */}
                    <rect width="270" height="30" rx="8" fill="#161b22" />
                    <circle cx="20" cy="15" r="5" fill="#f85149" />
                    <circle cx="38" cy="15" r="5" fill="#d29922" />
                    <circle cx="56" cy="15" r="5" fill="#3fb950" />
                    <text x="135" y="20" textAnchor="middle" fill="#8b949e" fontSize="11" fontFamily="JetBrains Mono, monospace">
                        terminal
                    </text>
                    {/* 命令内容 */}
                    <g transform="translate(15, 50)" fontFamily="JetBrains Mono, monospace" fontSize="11">
                        <text y="0" fill="#8b949e">~$</text>
                        <text y="0" x="25" fill="#c9d1d9">npm install -g your-tool</text>

                        <text y="25" fill="#3fb950">+ your-tool@1.0.0</text>
                        <text y="45" fill="#8b949e">added 1 package in 2s</text>

                        <text y="80" fill="#8b949e">~$</text>
                        <text y="80" x="25" fill="#c9d1d9">your-tool --help</text>

                        <text y="105" fill="#58a6ff">Usage: your-tool [options]</text>
                        <text y="125" fill="#c9d1d9">Options:</text>
                        <text y="145" fill="#c9d1d9">  -v, --version</text>
                        <text y="165" fill="#c9d1d9">  -h, --help</text>
                        <text y="185" fill="#c9d1d9">  -c, --config</text>

                        <text y="220" fill="#8b949e">~$</text>
                        <text y="220" x="25" fill="#c9d1d9">your-tool run</text>

                        <text y="245" fill="#3fb950">Success!</text>
                    </g>
                </g>
            </svg>
        );

        // 卡片3：功能矩阵
        const MatrixCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="300" height="400" fill="#0d1117" />
                <text x="150" y="40" textAnchor="middle" fill="#c9d1d9" fontSize="18" fontWeight="bold">
                    FEATURES
                </text>
                <rect x="100" y="50" width="100" height="2" fill="#30363d" />

                {/* 功能网格 */}
                <g transform="translate(20, 80)">
                    {[
                        { icon: '>', name: '快速执行', status: 'ACTIVE' },
                        { icon: '#', name: '智能解析', status: 'ACTIVE' },
                        { icon: '@', name: '自动补全', status: 'ACTIVE' },
                        { icon: '!', name: '错误追踪', status: 'ACTIVE' },
                        { icon: '*', name: '插件系统', status: 'BETA' },
                        { icon: '&', name: '远程同步', status: 'SOON' },
                    ].map((item, i) => (
                        <g key={i} transform={`translate(${(i % 2) * 130}, ${Math.floor(i / 2) * 95})`}>
                            <rect width="120" height="80" rx="6" fill="#161b22" stroke="#30363d" strokeWidth="1" />
                            <text x="60" y="30" textAnchor="middle" fill="#3fb950" fontSize="24" fontFamily="JetBrains Mono, monospace">
                                {item.icon}
                            </text>
                            <text x="60" y="52" textAnchor="middle" fill="#c9d1d9" fontSize="12">
                                {item.name}
                            </text>
                            <text x="60" y="70" textAnchor="middle"
                                fill={item.status === 'ACTIVE' ? '#3fb950' : item.status === 'BETA' ? '#d29922' : '#8b949e'}
                                fontSize="9" fontFamily="JetBrains Mono, monospace">
                                [{item.status}]
                            </text>
                        </g>
                    ))}
                </g>

                <text x="150" y="380" textAnchor="middle" fill="#30363d" fontSize="10" fontFamily="JetBrains Mono, monospace">
                    MORE FEATURES COMING...
                </text>
            </svg>
        );

        // 卡片4：获取方式
        const GetCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="300" height="400" fill="#0d1117" />

                <text x="150" y="50" textAnchor="middle" fill="#c9d1d9" fontSize="18" fontWeight="bold">
                    GET STARTED
                </text>

                {/* 安装命令框 */}
                <g transform="translate(20, 80)">
                    <rect width="260" height="50" rx="6" fill="#161b22" stroke="#30363d" strokeWidth="1" />
                    <text x="130" y="32" textAnchor="middle" fill="#3fb950" fontSize="13" fontFamily="JetBrains Mono, monospace">
                        npm install -g your-tool
                    </text>
                </g>

                {/* 或者 */}
                <text x="150" y="160" textAnchor="middle" fill="#8b949e" fontSize="12">OR</text>

                {/* 克隆命令框 */}
                <g transform="translate(20, 180)">
                    <rect width="260" height="50" rx="6" fill="#161b22" stroke="#30363d" strokeWidth="1" />
                    <text x="130" y="32" textAnchor="middle" fill="#58a6ff" fontSize="11" fontFamily="JetBrains Mono, monospace">
                        git clone github.com/...
                    </text>
                </g>

                {/* 链接信息 */}
                <g transform="translate(20, 270)" fontFamily="JetBrains Mono, monospace" fontSize="11">
                    <text y="0" fill="#8b949e">// Resources</text>
                    <text y="25" fill="#58a6ff">Docs: docs.example.com</text>
                    <text y="50" fill="#58a6ff">GitHub: github.com/...</text>
                    <text y="75" fill="#58a6ff">Discord: discord.gg/...</text>
                </g>

                {/* 底部装饰 */}
                <text x="150" y="380" textAnchor="middle" fill="#3fb950" fontSize="11" fontFamily="JetBrains Mono, monospace">
                    {'<'} HACK THE PLANET {'>'}
                </text>
            </svg>
        );

        const App = () => {
            const [downloading, setDownloading] = useState(false);

            const handleDownload = async () => {
                setDownloading(true);
                const cards = [
                    { id: 'card-1', name: '01_启动' },
                    { id: 'card-2', name: '02_命令' },
                    { id: 'card-3', name: '03_功能' },
                    { id: 'card-4', name: '04_获取' },
                ];

                await window.CardUtils.downloadCards(cards, 'dark-terminal-cards.zip', {
                    onEnd: () => setDownloading(false),
                    onError: (err) => alert('下载失败: ' + err.message)
                });
            };

            return (
                <div className="min-h-screen py-10 px-4 pb-24">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 max-w-7xl mx-auto">
                        <div id="card-1" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-2xl rounded-lg overflow-hidden border border-gray-800">
                            <BootCard />
                        </div>
                        <div id="card-2" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-2xl rounded-lg overflow-hidden border border-gray-800">
                            <CommandCard />
                        </div>
                        <div id="card-3" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-2xl rounded-lg overflow-hidden border border-gray-800">
                            <MatrixCard />
                        </div>
                        <div id="card-4" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-2xl rounded-lg overflow-hidden border border-gray-800">
                            <GetCard />
                        </div>
                    </div>

                    <button
                        onClick={handleDownload}
                        disabled={downloading}
                        className={`fixed bottom-8 right-8 z-50 flex items-center gap-2 px-6 py-3 rounded-lg shadow-lg transition-all duration-300 font-mono ${downloading
                                ? 'bg-gray-700 cursor-not-allowed text-gray-400'
                                : 'bg-green-600 hover:bg-green-500 text-black hover:scale-105'
                            } font-bold`}
                    >
                        {downloading ? '> Processing...' : '> Download.zip'}
                    </button>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
