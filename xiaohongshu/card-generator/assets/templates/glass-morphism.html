<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极光玻璃风格模板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- 引入公共工具脚本 -->
    <script src="../js/utils.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body {
            font-family: 'Outfit', sans-serif;
            background: #eef2f5;
            min-height: 100vh;
        }
        /* 动态背景 */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(216, 180, 254, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(167, 243, 208, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(147, 197, 253, 0.3) 0%, transparent 60%);
            filter: blur(40px);
        }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        // 通用毛玻璃卡片背景组件
        const GlassRect = ({ width, height, x, y, rx, opacity = 0.4, stroke = "rgba(255,255,255,0.6)" }) => (
            <g>
                <rect x={x} y={y} width={width} height={height} rx={rx} fill={`rgba(255,255,255,${opacity})`} />
                <rect x={x} y={y} width={width} height={height} rx={rx} fill="none" stroke={stroke} strokeWidth="1" />
            </g>
        );

        // 卡片1：标题封面
        const CoverCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                {/* 背景渐变 */}
                <defs>
                    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stopColor="#e0c3fc" />
                        <stop offset="100%" stopColor="#8ec5fc" />
                    </linearGradient>
                </defs>
                <rect width="300" height="400" fill="url(#grad1)" />
                
                {/* 装饰球体 */}
                <circle cx="240" cy="80" r="60" fill="rgba(255,255,255,0.3)" />
                <circle cx="40" cy="340" r="80" fill="rgba(255,255,255,0.2)" />
                
                {/* 玻璃卡片主体 */}
                <GlassRect x="25" y="60" width="250" height="280" rx="20" opacity="0.25" />
                
                {/* 内容 */}
                <text x="150" y="140" textAnchor="middle" fill="#fff" fontSize="14" letterSpacing="4" fontWeight="600">
                    WEEKLY INSIGHT
                </text>
                <text x="150" y="200" textAnchor="middle" fill="#fff" fontSize="36" fontWeight="800" style={{ textShadow: "0 4px 10px rgba(0,0,0,0.1)" }}>
                    未来视界
                </text>
                <line x1="100" y1="230" x2="200" y2="230" stroke="rgba(255,255,255,0.8)" strokeWidth="2" strokeLinecap="round" />
                
                <text x="150" y="270" textAnchor="middle" fill="rgba(255,255,255,0.9)" fontSize="14">
                    Exploring Design & Tech
                </text>
                
                {/* 底部日期 */}
                <GlassRect x="80" y="320" width="140" height="40" rx="20" opacity="0.4" />
                <text x="150" y="347" textAnchor="middle" fill="#4a5568" fontSize="12" fontWeight="600">
                    2024.10.24
                </text>
            </svg>
        );

        // 卡片2：语录/观点
        const QuoteCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stopColor="#a8edea" />
                        <stop offset="100%" stopColor="#fed6e3" />
                    </linearGradient>
                </defs>
                <rect width="300" height="400" fill="url(#grad2)" />
                
                {/* 大玻璃面板 */}
                <GlassRect x="20" y="40" width="260" height="320" rx="16" opacity="0.3" />
                
                {/* 引用符号 */}
                <text x="50" y="110" fill="rgba(255,255,255,0.8)" fontSize="80" fontFamily="serif">"</text>
                
                {/* 文字内容 */}
                <foreignObject x="50" y="120" width="200" height="150">
                    <div xmlns="http://www.w3.org/1999/xhtml" style={{ color: '#4a5568', fontSize: '20px', fontWeight: '600', lineHeight: '1.6', textAlign: 'left' }}>
                        设计不仅是外观和感觉，设计就是它的运作方式。
                    </div>
                </foreignObject>
                
                <text x="50" y="300" fill="#718096" fontSize="14" fontWeight="600">
                    —— 史蒂夫·乔布斯
                </text>
                
                <circle cx="240" cy="300" r="15" fill="#fff" opacity="0.6" />
            </svg>
        );

        // 卡片3：数据统计
        const StatsCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad3" x1="100%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stopColor="#d299c2" />
                        <stop offset="100%" stopColor="#fef9d7" />
                    </linearGradient>
                </defs>
                <rect width="300" height="400" fill="url(#grad3)" />
                
                <text x="40" y="60" fill="white" fontSize="24" fontWeight="800">Growth</text>
                
                {/* 统计条目 */}
                <g transform="translate(30, 90)">
                    {[
                        { label: 'Followers', val: '12.5K', color: '#fff' },
                        { label: 'Likes', val: '86.2K', color: '#fff' },
                        { label: 'Rate', val: '+24%', color: '#d1fae5' }
                    ].map((item, i) => (
                        <g key={i} transform={`translate(0, ${i * 90})`}>
                            <GlassRect x="0" y="0" width="240" height="70" rx="12" opacity="0.25" />
                            <text x="20" y="25" fill="rgba(255,255,255,0.9)" fontSize="12">{item.label}</text>
                            <text x="20" y="55" fill={item.color} fontSize="28" fontWeight="700">{item.val}</text>
                            {/* 简单的图表装饰 */}
                            <path d="M160 45 L180 30 L200 40 L220 20" fill="none" stroke="rgba(255,255,255,0.8)" strokeWidth="2" />
                        </g>
                    ))}
                </g>
            </svg>
        );

        // 卡片4：标签列表
        const TagsCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stopColor="#89f7fe" />
                        <stop offset="100%" stopColor="#66a6ff" />
                    </linearGradient>
                </defs>
                <rect width="300" height="400" fill="url(#grad4)" />
                
                <GlassRect x="30" y="30" width="240" height="340" rx="16" opacity="0.2" />
                
                <text x="150" y="80" textAnchor="middle" fill="white" fontSize="20" fontWeight="bold">Key Trends</text>
                
                <g transform="translate(55, 120)">
                    {['#Minimalism', '#Glassmorphism', '#Artificial', '#Eco-Friendly', '#Vibrant'].map((tag, i) => (
                        <g key={i} transform={`translate(0, ${i * 50})`}>
                           <rect x="0" y="-20" width="190" height="36" rx="18" fill="rgba(255,255,255,0.3)" />
                           <text x="95" y="4" textAnchor="middle" fill="white" fontSize="14" fontWeight="500">{tag}</text>
                        </g>
                    ))}
                </g>
                
                
                <text x="150" y="380" textAnchor="middle" fill="rgba(255,255,255,0.7)" fontSize="10">@DesignTrends2024</text>
            </svg>
        );

        const App = () => {
            const [downloading, setDownloading] = useState(false);

            const handleDownload = async () => {
                setDownloading(true);
                const cards = [
                    { id: 'card-1', name: '01_Cover' },
                    { id: 'card-2', name: '02_Quote' },
                    { id: 'card-3', name: '03_Stats' },
                    { id: 'card-4', name: '04_Tags' },
                ];

                await window.CardUtils.downloadCards(cards, 'glass-morphism-cards.zip', {
                    onEnd: () => setDownloading(false),
                    onError: (err) => alert('下载出错：' + err.message)
                });
            };

            return (
                <div className="min-h-screen py-10 px-4 pb-24">
                    <div className="text-center mb-10">
                        <h1 className="text-4xl font-bold text-gray-800 mb-2">Glass Morphism</h1>
                        <p className="text-gray-500">现代极光玻璃质感设计</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 max-w-7xl mx-auto">
                        <div id="card-1" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-2xl rounded-2xl overflow-hidden transition-transform hover:scale-[1.02]">
                            <CoverCard />
                        </div>
                        <div id="card-2" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-2xl rounded-2xl overflow-hidden transition-transform hover:scale-[1.02]">
                            <QuoteCard />
                        </div>
                        <div id="card-3" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-2xl rounded-2xl overflow-hidden transition-transform hover:scale-[1.02]">
                            <StatsCard />
                        </div>
                        <div id="card-4" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-2xl rounded-2xl overflow-hidden transition-transform hover:scale-[1.02]">
                            <TagsCard />
                        </div>
                    </div>

                    <button 
                        onClick={handleDownload}
                        disabled={downloading}
                        className={`fixed bottom-8 right-8 z-50 flex items-center gap-2 px-8 py-4 rounded-full shadow-lg backdrop-blur-md transition-all duration-300 ${
                            downloading 
                            ? 'bg-white/50 text-gray-500 cursor-not-allowed' 
                            : 'bg-white/80 hover:bg-white text-blue-600 hover:scale-105 border border-white'
                        } font-bold`}
                    >
                        {downloading ? 'Prepare Export...' : 'Download All Cards'}
                    </button>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
