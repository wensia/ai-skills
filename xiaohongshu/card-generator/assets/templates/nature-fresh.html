<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自然清新风格模板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="../js/utils.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Nunito:wght@300;400;600&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f1f3f0;
            color: #2f3e46;
            min-height: 100vh;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const colors = {
            dark: '#2f3e46',
            medium: '#52796f',
            light: '#84a98c',
            pale: '#cad2c5',
            bg: '#f4f3ee',
        };

        const LeafIcon = ({ x, y, scale = 1, rotation = 0, color }) => (
            <path
                d="M30,0 C60,0 60,30 30,60 C0,60 0,30 30,0 Z"
                fill={color}
                transform={`translate(${x}, ${y}) scale(${scale}) rotate(${rotation})`}
                opacity="0.8"
            />
        );

        const IntroCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="300" height="400" fill={colors.bg} />

                {/* Organic blob background */}
                <path d="M0,0 L300,0 L300,150 C250,180 200,120 150,160 C100,200 50,150 0,200 Z" fill={colors.light} opacity="0.2" />
                <path d="M0,400 L300,400 L300,250 C250,220 200,280 150,240 C100,200 50,250 0,200 Z" fill={colors.pale} opacity="0.3" />

                <LeafIcon x={220} y={60} scale={0.5} rotation={30} color={colors.medium} />
                <LeafIcon x={40} y={320} scale={0.8} rotation={-45} color={colors.light} />

                <text x="150" y="160" textAnchor="middle" fill={colors.dark} fontSize="14" fontWeight="600" letterSpacing="2">NATURAL LIFE</text>
                <text x="150" y="200" textAnchor="middle" fill={colors.dark} fontSize="36" fontFamily="Merriweather" fontWeight="700">Organic</text>
                <text x="150" y="235" textAnchor="middle" fill={colors.medium} fontSize="36" fontFamily="Merriweather" fontStyle="italic">Living</text>

                <line x1="120" y1="260" x2="180" y2="260" stroke={colors.medium} strokeWidth="1" opacity="0.5" />

                <text x="150" y="360" textAnchor="middle" fill={colors.medium} fontSize="10">SINCE 2024</text>
            </svg>
        );

        const ProductCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="300" height="400" fill="#fff" />
                <rect x="10" y="10" width="280" height="380" fill="none" stroke={colors.bg} strokeWidth="10" />

                {/* Image Placeholder */}
                <circle cx="150" cy="140" r="80" fill={colors.pale} />
                <LeafIcon x={120} y={110} scale={1} rotation={0} color="white" />

                <text x="150" y="250" textAnchor="middle" fill={colors.dark} fontSize="22" fontFamily="Merriweather" fontWeight="700">Herbal Tea</text>
                <text x="150" y="275" textAnchor="middle" fill={colors.medium} fontSize="14">Premium Selection</text>

                <text x="150" y="310" textAnchor="middle" fill="#888" fontSize="11" opacity="0.8">
                    100% Organic Ingredients
                </text>

                <rect x="100" y="330" width="100" height="30" rx="15" fill={colors.medium} />
                <text x="150" y="350" textAnchor="middle" fill="white" fontSize="12" fontWeight="bold">ORDER NOW</text>
            </svg>
        );

        const QuoteNaturalCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="300" height="400" fill={colors.medium} />
                <rect x="15" y="15" width="270" height="370" fill="none" stroke="white" strokeWidth="1" opacity="0.3" />

                <text x="40" y="80" fill="white" fontSize="60" fontFamily="Merriweather" opacity="0.4">"</text>

                <foreignObject x="40" y="100" width="220" height="200">
                    <div xmlns="http://www.w3.org/1999/xhtml" style={{ color: '#fff', fontSize: '20px', fontFamily: 'Merriweather', lineHeight: '1.6', fontStyle: 'italic' }}>
                        Nature does not hurry, yet everything is accomplished.
                    </div>
                </foreignObject>

                <text x="40" y="280" fill={colors.pale} fontSize="14" fontWeight="600">Lao Tzu</text>

                <LeafIcon x={220} y={320} scale={0.8} rotation={15} color="rgba(255,255,255,0.2)" />
            </svg>
        );

        const IngredientsCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="300" height="400" fill="#fcfcfc" />

                <text x="150" y="60" textAnchor="middle" fill={colors.dark} fontSize="18" fontWeight="bold">INGREDIENTS</text>

                <g transform="translate(40, 100)">
                    {[
                        { name: 'Mint Leaf', desc: 'Fresh & Cooling' },
                        { name: 'Chamomile', desc: 'Calming Effect' },
                        { name: 'Lavender', desc: 'Soothing Scale' },
                        { name: 'Green Tea', desc: 'Antioxidant' }
                    ].map((item, i) => (
                        <g key={i} transform={`translate(0, ${i * 70})`}>
                            <circle cx="20" cy="20" r="20" fill={colors.pale} opacity="0.5" />
                            <text x="55" y="20" fill={colors.dark} fontSize="16" fontFamily="Merriweather" fontWeight="bold">{item.name}</text>
                            <text x="55" y="40" fill={colors.medium} fontSize="12">{item.desc}</text>
                        </g>
                    ))}
                </g>
            </svg>
        );

        const App = () => {
            const [downloading, setDownloading] = useState(false);

            const handleDownload = async () => {
                setDownloading(true);
                const cards = [
                    { id: 'card-1', name: '01_Intro' },
                    { id: 'card-2', name: '02_Product' },
                    { id: 'card-3', name: '03_Quote' },
                    { id: 'card-4', name: '04_List' },
                ];

                await window.CardUtils.downloadCards(cards, 'nature-cards.zip', {
                    onEnd: () => setDownloading(false),
                    onError: (err) => alert('Error: ' + err.message)
                });
            };

            return (
                <div className="min-h-screen py-10 px-4 pb-24">
                    <div className="text-center mb-12">
                        <h1 className="text-4xl text-[#2f3e46] font-serif mb-2">Nature & Organic</h1>
                        <p className="text-[#52796f]">自然有机生活方式</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 max-w-7xl mx-auto">
                        <div id="card-1" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-lg rounded-xl overflow-hidden">
                            <IntroCard />
                        </div>
                        <div id="card-2" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-lg rounded-xl overflow-hidden">
                            <ProductCard />
                        </div>
                        <div id="card-3" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-lg rounded-xl overflow-hidden">
                            <QuoteNaturalCard />
                        </div>
                        <div id="card-4" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-lg rounded-xl overflow-hidden">
                            <IngredientsCard />
                        </div>
                    </div>

                    <button
                        onClick={handleDownload}
                        disabled={downloading}
                        className={`fixed bottom-8 right-8 z-50 px-8 py-3 rounded-full shadow-lg transition-all duration-300 ${downloading
                                ? 'bg-[#cad2c5] text-gray-500 cursor-not-allowed'
                                : 'bg-[#52796f] hover:bg-[#2f3e46] text-white hover:shadow-xl'
                            }`}
                    >
                        {downloading ? 'Packing...' : 'Download Set'}
                    </button>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
