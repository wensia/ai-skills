<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS备忘录风格模板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="../js/utils.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f2f7;
            /* iOS System Gray 6 */
            min-height: 100vh;
        }

        /* 纸张纹理背景 */
        .paper-texture {
            background-color: #fff9e6;
            /* 经典的淡黄色备忘录背景 */
            background-image: linear-gradient(#e5e0cc 1px, transparent 1px);
            background-size: 100% 30px;
        }

        .handwritten {
            font-family: 'Caveat', cursive;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const colors = {
            yellow: '#ffd60a',
            systemYellow: '#ffcc00',
            text: '#1c1c1e',
            gray: '#8e8e93',
            highlight: 'rgba(255, 214, 10, 0.3)',
            folderIcon: '#eeba50'
        };

        // 模拟手绘的高亮笔触
        const HighlightPath = ({ width }) => (
            <path d={`M0,15 Q${width / 2},5 ${width},10`} stroke={colors.highlight} strokeWidth="20" fill="none" style={{ mixBlendMode: 'multiply' }} />
        );

        // 卡片1：封面（文件夹风格）
        const CoverCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="300" height="400" fill="#f2f2f7" />

                {/* 顶部状态栏模拟 */}
                <text x="20" y="25" fill="#1c1c1e" fontSize="12" fontWeight="600">9:41</text>
                <path d="M260,18 h20 a2,2 0 0 1 2,2 v8 a2,2 0 0 1 -2,2 h-20 a2,2 0 0 1 -2,-2 v-8 a2,2 0 0 1 2,-2 z" stroke="#1c1c1e" fill="none" />
                <rect x="262" y="20" width="16" height="8" fill="#1c1c1e" />

                {/* 大标题 */}
                <text x="20" y="80" fill="#1c1c1e" fontSize="34" fontWeight="bold" fontFamily="Inter">Notes</text>

                {/* 搜索框 */}
                <rect x="20" y="100" width="260" height="36" rx="8" fill="#e3e3e8" />
                <circle cx="40" cy="118" r="6" stroke="#8e8e93" strokeWidth="2" fill="none" />
                <line x1="44" y1="122" x2="48" y2="126" stroke="#8e8e93" strokeWidth="2" strokeLinecap="round" />
                <text x="60" y="122" fill="#8e8e93" fontSize="14">Search</text>

                {/* 文件夹列表区块 */}
                <rect x="20" y="160" width="260" height="180" rx="12" fill="white" />

                {/* Folder Item 1 - Pinned */}
                <g transform="translate(40, 190)">
                    <path d="M0,0 h14 l2,2 h10 a2,2 0 0 1 2,2 v14 a2,2 0 0 1 -2,2 h-26 a2,2 0 0 1 -2,-2 v-16 a2,2 0 0 1 2,-2" fill={colors.folderIcon} />
                    <text x="40" y="14" fill="#1c1c1e" fontSize="16" fontWeight="500">Ideas</text>
                    <text x="220" y="14" textAnchor="end" fill="#8e8e93" fontSize="14">4</text>
                    <line x1="40" y1="35" x2="220" y2="35" stroke="#e5e5ea" strokeWidth="1" />
                </g>

                {/* Folder Item 2 */}
                <g transform="translate(40, 240)">
                    <path d="M0,0 h14 l2,2 h10 a2,2 0 0 1 2,2 v14 a2,2 0 0 1 -2,2 h-26 a2,2 0 0 1 -2,-2 v-16 a2,2 0 0 1 2,-2" fill={colors.folderIcon} />
                    <text x="40" y="14" fill="#1c1c1e" fontSize="16" fontWeight="500">To-Do</text>
                    <text x="220" y="14" textAnchor="end" fill="#8e8e93" fontSize="14">12</text>
                    <line x1="40" y1="35" x2="220" y2="35" stroke="#e5e5ea" strokeWidth="1" />
                </g>

                {/* Folder Item 3 */}
                <g transform="translate(40, 290)">
                    <path d="M0,0 h14 l2,2 h10 a2,2 0 0 1 2,2 v14 a2,2 0 0 1 -2,2 h-26 a2,2 0 0 1 -2,-2 v-16 a2,2 0 0 1 2,-2" fill={colors.folderIcon} />
                    <text x="40" y="14" fill="#1c1c1e" fontSize="16" fontWeight="500">Journal</text>
                    <text x="220" y="14" textAnchor="end" fill="#8e8e93" fontSize="14">28</text>
                </g>
            </svg>
        );

        // 卡片2：清单列表
        const ListCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                {/* 纸张背景 - 使用淡黄色底色和线条 */}
                <rect width="300" height="400" fill="#fffbe6" />
                <defs>
                    <pattern id="lines" x="0" y="0" width="300" height="30" patternUnits="userSpaceOnUse">
                        <line x1="0" y1="29" x2="300" y2="29" stroke="#f0e6c5" strokeWidth="1" />
                    </pattern>
                </defs>
                <rect width="300" height="400" fill="url(#lines)" />

                {/* 顶部导航 */}
                <text x="20" y="40" fill={colors.systemYellow} fontSize="16">{'< Folders'}</text>

                <text x="20" y="80" fill="#1c1c1e" fontSize="28" fontWeight="bold" fontFamily="Inter">Tasks</text>

                {/* 列表项 */}
                <g transform="translate(20, 120)">
                    {[
                        { text: "Update Design System", done: true },
                        { text: "Review Pull Requests", done: true },
                        { text: "Team Sync Meeting", done: false },
                        { text: "Draft Documentation", done: false },
                        { text: "Coffee Break ☕️", done: false }
                    ].map((item, i) => (
                        <g key={i} transform={`translate(0, ${i * 40})`}>
                            <circle cx="10" cy="-5" r="8" stroke={colors.gray} strokeWidth="1" fill={item.done ? colors.systemYellow : "none"} style={{ opacity: 0.6 }} />
                            {item.done && <path d="M6,-5 l3,3 l5,-5" stroke="white" strokeWidth="2" fill="none" />}

                            <text x="30" y="0" fill={item.done ? "#8e8e93" : "#1c1c1e"} fontSize="18" fontFamily="Caveat" fontWeight="700">
                                {item.text}
                            </text>

                            {/* 手绘划线 */}
                            {item.done && <path d={`M30,0 q50,-10 180,5`} stroke="#8e8e93" strokeWidth="1" opacity="0.5" fill="none" />}
                        </g>
                    ))}
                </g>
            </svg>
        );

        // 卡片3：手绘笔记
        const NoteCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="300" height="400" fill="#fffbe6" />
                {/* Grid Pattern */}
                <defs>
                    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                        <rect width="20" height="20" fill="none" stroke="#f0e6c5" strokeWidth="0.5" />
                    </pattern>
                </defs>
                <rect width="300" height="400" fill="url(#grid)" />

                <text x="150" y="60" textAnchor="middle" fill="#1c1c1e" fontSize="24" fontFamily="Caveat" fontWeight="700">
                    Brainstorming
                </text>
                <text x="150" y="80" textAnchor="middle" fill="#8e8e93" fontSize="12">
                    Today, 10:23 AM
                </text>

                {/* 手绘涂鸦内容 */}
                <g transform="translate(40, 120)">
                    {/* 荧光笔高亮 */}
                    <g transform="translate(-5, -15)">
                        <path d="M0,15 Q60,5 120,15" stroke={colors.highlight} strokeWidth="18" fill="none" />
                    </g>
                    <text x="0" y="0" fill="#1c1c1e" fontSize="20" fontFamily="Caveat">Key Concept:</text>

                    <text x="0" y="40" fill="#1c1c1e" fontSize="18" fontFamily="Caveat">
                        1. Keep it simple
                    </text>
                    <text x="0" y="70" fill="#1c1c1e" fontSize="18" fontFamily="Caveat">
                        2. Natural interaction
                    </text>

                    {/* 涂鸦圈选 */}
                    <path d="M-10,35 q30,-10 160,0 q10,30 -20,45 q-150,0 -140,-45" stroke="#ef4444" strokeWidth="1.5" fill="none" opacity="0.7" strokeDasharray="5,2" />

                    {/* 对话气泡涂鸦 */}
                    <path d="M120,80 q30,-30 60,-10 q10,30 -10,40 l-10,10 l5,-20" stroke="#007aff" strokeWidth="1.5" fill="none" />
                    <text x="140" y="95" fill="#007aff" fontSize="14" fontFamily="Caveat">Great!</text>

                    {/* 贴图 */}
                    <rect x="20" y="110" width="100" height="80" fill="#d1fae5" transform="rotate(-5)" opacity="0.8" />
                    <text x="35" y="135" fill="#065f46" fontSize="16" fontFamily="Caveat" transform="rotate(-5)">
                        Design is
                    </text>
                    <text x="35" y="155" fill="#065f46" fontSize="16" fontFamily="Caveat" transform="rotate(-5)">
                        Logic!
                    </text>
                    {/* 胶带 */}
                    <rect x="60" y="105" width="20" height="10" fill="rgba(0,0,0,0.1)" transform="rotate(-5)" />
                </g>
            </svg>
        );

        // 卡片4：分享卡片
        const ShareCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="300" height="400" fill="#f2f2f7" />

                {/* 类似iOS的模态窗口底部 */}
                <rect x="0" y="100" width="300" height="300" rx="20" fill="white" />

                {/* 抓手 */}
                <rect x="130" y="115" width="40" height="4" rx="2" fill="#e5e5ea" />

                {/* 图标预览 */}
                <rect x="100" y="140" width="100" height="100" rx="16" fill="#fffbe6" stroke="#e5e5ea" strokeWidth="1" />
                {/* 缩小版的内容 */}
                <path d="M110,160 h80 M110,180 h60 M110,200 h70" stroke="#d1d1d6" strokeWidth="4" strokeLinecap="round" />

                <text x="150" y="270" textAnchor="middle" fill="#1c1c1e" fontSize="18" fontWeight="600" fontFamily="Inter">
                    Ideas.note
                </text>
                <text x="150" y="290" textAnchor="middle" fill="#8e8e93" fontSize="12">
                    2.4 MB • Shared from Notes
                </text>

                <line x1="20" y1="310" x2="280" y2="310" stroke="#e5e5ea" strokeWidth="1" />

                {/* 按钮 */}
                <text x="150" y="340" textAnchor="middle" fill="#007aff" fontSize="18" fontWeight="500">
                    Send a Copy
                </text>
            </svg>
        );

        const App = () => {
            const [downloading, setDownloading] = useState(false);

            const handleDownload = async () => {
                setDownloading(true);
                const cards = [
                    { id: 'card-1', name: '01_Folder' },
                    { id: 'card-2', name: '02_List' },
                    { id: 'card-3', name: '03_Note' },
                    { id: 'card-4', name: '04_Share' },
                ];

                await window.CardUtils.downloadCards(cards, 'apple-notes-cards.zip', {
                    onEnd: () => setDownloading(false),
                    onError: (err) => alert('Error: ' + err.message)
                });
            };

            return (
                <div className="min-h-screen py-10 px-4 pb-24 bg-[#f2f2f7]">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 max-w-7xl mx-auto">
                        <div id="card-1" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-sm rounded-[30px] overflow-hidden">
                            <CoverCard />
                        </div>
                        <div id="card-2" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-sm rounded-[30px] overflow-hidden">
                            <ListCard />
                        </div>
                        <div id="card-3" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-sm rounded-[30px] overflow-hidden">
                            <NoteCard />
                        </div>
                        <div id="card-4" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-sm rounded-[30px] overflow-hidden">
                            <ShareCard />
                        </div>
                    </div>

                    <button
                        onClick={handleDownload}
                        disabled={downloading}
                        className={`fixed bottom-8 right-8 z-50 px-6 py-3 rounded-full shadow-lg transition-all duration-300 font-medium ${downloading
                                ? 'bg-gray-400 cursor-not-allowed'
                                : 'bg-[#ffcc00] text-black hover:scale-105'
                            }`}
                    >
                        {downloading ? 'Exporting...' : 'Export Notes'}
                    </button>

                    <div className="fixed bottom-8 left-8 text-gray-400 text-sm font-medium opacity-50 pointer-events-none">
                        iOS Style Note Template
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
