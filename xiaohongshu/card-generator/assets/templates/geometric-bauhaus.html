<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>几何包豪斯风格模板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="../js/utils.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f1ea;
            color: #111;
            min-height: 100vh;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const colors = {
            red: '#e93c2e',
            blue: '#2b449b',
            yellow: '#fba919',
            dark: '#111111',
            bg: '#f4f1ea'
        };

        const PosterCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="300" height="400" fill={colors.bg} />

                {/* Geometric Shapes */}
                <circle cx="150" cy="150" r="100" fill={colors.red} opacity="0.9" />
                <rect x="150" y="150" width="100" height="200" fill={colors.blue} opacity="0.9" />
                <path d="M50 350 L150 250 L50 250 Z" fill={colors.yellow} opacity="0.9" />

                {/* Grid Lines */}
                <line x1="150" y1="0" x2="150" y2="400" stroke={colors.dark} strokeWidth="1" />
                <line x1="0" y1="250" x2="300" y2="250" stroke={colors.dark} strokeWidth="1" />

                {/* Text */}
                <text x="20" y="60" fill={colors.dark} fontSize="36" fontWeight="900">BAU</text>
                <text x="20" y="95" fill={colors.dark} fontSize="36" fontWeight="900">HAUS</text>

                <text x="280" y="380" textAnchor="end" fill="white" fontSize="14" fontWeight="bold">DESIGN 1919</text>

                <rect x="250" y="20" width="30" height="30" fill={colors.yellow} />
            </svg>
        );

        const EventCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="300" height="400" fill={colors.bg} />

                <rect x="20" y="20" width="260" height="360" fill="none" stroke={colors.dark} strokeWidth="2" />

                {/* Diagonal stripes */}
                <defs>
                    <pattern id="stripes" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                        <line x1="0" y1="0" x2="0" y2="10" stroke={colors.dark} strokeWidth="4" />
                    </pattern>
                </defs>

                <rect x="20" y="20" width="260" height="100" fill="url(#stripes)" opacity="0.1" />

                <circle cx="150" cy="180" r="60" fill={colors.yellow} />
                <rect x="120" y="150" width="60" height="60" fill={colors.blue} style={{ mixBlendMode: 'multiply' }} />

                <text x="150" y="280" textAnchor="middle" fill={colors.dark} fontSize="24" fontWeight="900" letterSpacing="-1">EXHIBITION</text>
                <text x="150" y="305" textAnchor="middle" fill={colors.red} fontSize="14" fontWeight="bold">MODERN ART</text>

                <text x="150" y="340" textAnchor="middle" fill={colors.dark} fontSize="12">MAY 20 - JUNE 15</text>
            </svg>
        );

        const TypographyCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="300" height="400" fill="#e93c2e" />

                <path d="M0 0 L300 400" stroke={colors.bg} strokeWidth="2" />
                <path d="M300 0 L0 400" stroke={colors.bg} strokeWidth="2" />

                <circle cx="150" cy="200" r="80" fill={colors.bg} />

                <text x="150" y="195" textAnchor="middle" fill={colors.dark} fontSize="80" fontWeight="900" lineHeight="1">A</text>
                <text x="150" y="240" textAnchor="middle" fill={colors.dark} fontSize="14" fontWeight="bold">Typography</text>

                <rect x="0" y="350" width="150" height="50" fill={colors.blue} />
                <rect x="150" y="350" width="150" height="50" fill={colors.yellow} />
            </svg>
        );

        const PatternCard = () => (
            <svg viewBox="0 0 300 400" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="300" height="400" fill={colors.bg} />

                <g transform="translate(25, 25)">
                    {[0, 1, 2, 3].map(row =>
                        [0, 1, 2].map(col => {
                            const shapes = [
                                <circle key="c" cx="0" cy="0" r="30" fill={colors.red} />,
                                <rect key="r" x="-30" y="-30" width="60" height="60" fill={colors.blue} />,
                                <polygon key="t" points="0,-30 30,30 -30,30" fill={colors.yellow} />
                            ];
                            const shape = shapes[(row + col) % 3];
                            return (
                                <g key={`${row}-${col}`} transform={`translate(${col * 90 + 35}, ${row * 90 + 35})`}>
                                    {shape}
                                </g>
                            )
                        })
                    )}
                </g>

                <rect x="50" y="150" width="200" height="100" fill="white" stroke={colors.dark} strokeWidth="3" />
                <text x="150" y="200" textAnchor="middle" fill={colors.dark} fontSize="24" fontWeight="900">PATTERN</text>
                <text x="150" y="225" textAnchor="middle" fill={colors.dark} fontSize="14">SYSTEM</text>
            </svg>
        );

        const App = () => {
            const [downloading, setDownloading] = useState(false);

            const handleDownload = async () => {
                setDownloading(true);
                const cards = [
                    { id: 'card-1', name: '01_Poster' },
                    { id: 'card-2', name: '02_Event' },
                    { id: 'card-3', name: '03_Type' },
                    { id: 'card-4', name: '04_Pattern' },
                ];

                await window.CardUtils.downloadCards(cards, 'bauhaus-cards.zip', {
                    onEnd: () => setDownloading(false),
                    onError: (err) => alert('Error: ' + err.message)
                });
            };

            return (
                <div className="min-h-screen py-10 px-4 pb-24">
                    <div className="text-center mb-12">
                        <h1 className="text-4xl font-black tracking-tighter mb-2 uppercase" style={{ color: '#111' }}>Bauhaus</h1>
                        <p className="text-gray-600 font-bold uppercase tracking-widest text-sm">Form Follows Function</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 max-w-7xl mx-auto">
                        <div id="card-1" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-xl border-4 border-black">
                            <PosterCard />
                        </div>
                        <div id="card-2" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-xl border-4 border-black">
                            <EventCard />
                        </div>
                        <div id="card-3" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-xl border-4 border-black">
                            <TypographyCard />
                        </div>
                        <div id="card-4" className="aspect-[3/4] w-full max-w-[300px] mx-auto shadow-xl border-4 border-black">
                            <PatternCard />
                        </div>
                    </div>

                    <button
                        onClick={handleDownload}
                        disabled={downloading}
                        className={`fixed bottom-8 right-8 z-50 px-8 py-4 font-black uppercase text-xl border-4 border-black box-border hover:-translate-y-1 hover:shadow-[8px_8px_0px_#000] transition-all duration-200 ${downloading
                                ? 'bg-gray-300 cursor-not-allowed'
                                : 'bg-[#fba919] text-black'
                            }`}
                    >
                        {downloading ? 'Processing...' : 'Download Assets'}
                    </button>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
